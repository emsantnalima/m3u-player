<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 M3U Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        header h1 { font-size: 24px; }
        
        .controls { display: flex; gap: 10px; flex-wrap: wrap; }
        
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            background: white;
            color: #667eea;
            font-weight: 600;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 30px;
        }
        
        .playlist-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            max-height: 60vh;
            display: flex;
            flex-direction: column;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e0e0e0;
        }
        
        .section-header h2 { font-size: 18px; color: #333; }
        
        #trackCount {
            font-size: 14px;
            color: #666;
            background: #e0e0e0;
            padding: 5px 10px;
            border-radius: 15px;
        }
        
        .playlist {
            list-style: none;
            overflow-y: auto;
            flex: 1;
        }
        
        .playlist li {
            padding: 12px 15px;
            margin: 5px 0;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
            border-left: 4px solid transparent;
        }
        
        .playlist li:hover {
            background: #e3e8ff;
            transform: translateX(5px);
        }
        
        .playlist li.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-left-color: #ffd700;
        }
        
        .playlist li .track-name {
            font-weight: 500;
            flex: 1;
            margin-right: 10px;
        }
        
        .playlist li .remove-btn {
            background: #ff4757;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
        }
        
        .player-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        .now-playing {
            text-align: center;
            width: 100%;
        }
        
        .album-art {
            font-size: 80px;
            margin-bottom: 15px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .track-info h3 {
            color: #333;
            margin-bottom: 5px;
            font-size: 18px;
        }
        
        .track-info p { color: #666; font-size: 14px; }
        
        audio { width: 100%; border-radius: 10px; }
        
        .player-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .player-controls button {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            max-width: 300px;
        }
        
        .volume-control input[type="range"] {
            flex: 1;
            height: 5px;
            border-radius: 5px;
            background: #ddd;
            outline: none;
        }
        
        .export-section {
            display: flex;
            gap: 10px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .export-section button { background: #667eea; color: white; }
        #clearBtn { background: #ff4757; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal.active { display: flex; }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 400px;
            width: 90%;
        }
        
        .modal-content h3 { margin-bottom: 20px; color: #333; }
        
        .modal-content input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        
        .modal-buttons button { color: white; }
        #cancelUrlBtn { background: #666; }
        
        @media (max-width: 768px) {
            .main-content { grid-template-columns: 1fr; }
            header { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎵 M3U Player</h1>
            <div class="controls">
                <button id="loadSampleBtn">📁 Carregar Exemplo</button>
                <input type="file" id="fileInput" accept=".m3u,.m3u8" hidden>
                <button id="uploadBtn">📤 Upload M3U</button>
                <button id="addUrlBtn">🔗 Adicionar URL</button>
            </div>
        </header>

        <div class="main-content">
            <div class="playlist-section">
                <div class="section-header">
                    <h2>📋 Playlist</h2>
                    <span id="trackCount">0 músicas</span>
                </div>
                <ul id="playlist" class="playlist"></ul>
            </div>

            <div class="player-section">
                <div class="now-playing">
                    <div class="album-art">🎶</div>
                    <div class="track-info">
                        <h3 id="currentTitle">Nenhuma música</h3>
                        <p id="currentArtist">Selecione uma faixa</p>
                    </div>
                </div>

                <audio id="audioPlayer" controls></audio>

                <div class="player-controls">
                    <button id="prevBtn" title="Anterior">⏮️</button>
                    <button id="playBtn" title="Play/Pause">▶️</button>
                    <button id="nextBtn" title="Próxima">⏭️</button>
                    <button id="shuffleBtn" title="Aleatório">🔀</button>
                    <button id="repeatBtn" title="Repetir">🔁</button>
                </div>

                <div class="volume-control">
                    <span>🔊</span>
                    <input type="range" id="volumeSlider" min="0" max="100" value="70">
                </div>

                <div class="export-section">
                    <button id="exportBtn">💾 Exportar M3U</button>
                    <button id="clearBtn">🗑️ Limpar Playlist</button>
                </div>
            </div>
        </div>

        <div id="urlModal" class="modal">
            <div class="modal-content">
                <h3>Adicionar URL</h3>
                <input type="text" id="urlInput" placeholder="https://exemplo.com/musica.mp3">
                <input type="text" id="titleInput" placeholder="Nome da música (opcional)">
                <div class="modal-buttons">
                    <button id="confirmUrlBtn">Adicionar</button>
                    <button id="cancelUrlBtn">Cancelar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        class M3UPlayer {
            constructor() {
                this.playlist = [];
                this.currentIndex = -1;
                this.isShuffled = false;
                this.isRepeating = false;
                
                this.initElements();
                this.bindEvents();
                this.updatePlaylistUI();
            }

            initElements() {
                this.audioPlayer = document.getElementById('audioPlayer');
                this.playlistElement = document.getElementById('playlist');
                this.currentTitle = document.getElementById('currentTitle');
                this.currentArtist = document.getElementById('currentArtist');
                this.trackCount = document.getElementById('trackCount');
                this.volumeSlider = document.getElementById('volumeSlider');
                this.playBtn = document.getElementById('playBtn');
                this.urlModal = document.getElementById('urlModal');
            }

            bindEvents() {
                document.getElementById('uploadBtn').addEventListener('click', () => {
                    document.getElementById('fileInput').click();
                });
                
                document.getElementById('fileInput').addEventListener('change', (e) => {
                    this.handleFileUpload(e.target.files[0]);
                });

                document.getElementById('playBtn').addEventListener('click', () => this.togglePlay());
                document.getElementById('prevBtn').addEventListener('click', () => this.playPrevious());
                document.getElementById('nextBtn').addEventListener('click', () => this.playNext());
                document.getElementById('shuffleBtn').addEventListener('click', () => this.toggleShuffle());
                document.getElementById('repeatBtn').addEventListener('click', () => this.toggleRepeat());
                
                this.volumeSlider.addEventListener('input', (e) => {
                    this.audioPlayer.volume = e.target.value / 100;
                });
                this.audioPlayer.volume = 0.7;

                this.audioPlayer.addEventListener('ended', () => this.handleTrackEnd());
                this.audioPlayer.addEventListener('error', () => this.playNext());

                document.getElementById('addUrlBtn').addEventListener('click', () => {
                    this.urlModal.classList.add('active');
                });
                document.getElementById('confirmUrlBtn').addEventListener('click', () => this.addUrlTrack());
                document.getElementById('cancelUrlBtn').addEventListener('click', () => {
                    this.urlModal.classList.remove('active');
                });

                document.getElementById('exportBtn').addEventListener('click', () => this.exportPlaylist());
                document.getElementById('clearBtn').addEventListener('click', () => this.clearPlaylist());
                document.getElementById('loadSampleBtn').addEventListener('click', () => this.loadSamplePlaylist());
            }

            loadSamplePlaylist() {
                this.playlist = [
                    {
                        title: "Happy Rock",
                        artist: "Bensound",
                        url: "https://www.bensound.com/bensound-music/bensound-happyrock.mp3"
                    },
                    {
                        title: "Sunny",
                        artist: "Bensound",
                        url: "https://www.bensound.com/bensound-music/bensound-sunny.mp3"
                    },
                    {
                        title: "Ukulele",
                        artist: "Bensound",
                        url: "https://www.bensound.com/bensound-music/bensound-ukulele.mp3"
                    }
                ];
                
                this.updatePlaylistUI();
                this.playTrack(0);
            }

            handleFileUpload(file) {
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    this.parseM3U(e.target.result);
                };
                reader.readAsText(file);
            }

            parseM3U(content) {
                const lines = content.split('\n');
                const tracks = [];
                let currentTrack = null;

                for (let line of lines) {
                    line = line.trim();
                    
                    if (line.startsWith('#EXTINF:')) {
                        const info = line.substring(8);
                        const commaIndex = info.indexOf(',');
                        
                        if (commaIndex > -1) {
                            const title = info.substring(commaIndex + 1);
                            currentTrack = {
                                title: title || 'Unknown Track',
                                artist: 'Unknown Artist'
                            };
                        }
                    } else if (line.startsWith('http')) {
                        if (currentTrack) {
                            currentTrack.url = line;
                            tracks.push(currentTrack);
                        } else {
                            tracks.push({
                                title: 'Radio Stream',
                                artist: 'Live',
                                url: line
                            });
                        }
                        currentTrack = null;
                    }
                }

                if (tracks.length > 0) {
                    this.playlist = tracks;
                    this.updatePlaylistUI();
                    this.playTrack(0);
                } else {
                    alert('Nenhuma faixa encontrada!');
                }
            }

            updatePlaylistUI() {
                this.playlistElement.innerHTML = '';
                this.trackCount.textContent = `${this.playlist.length} músicas`;

                this.playlist.forEach((track, index) => {
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <span class="track-name">${track.title || 'Track ' + (index + 1)}</span>
                        <button class="remove-btn" data-index="${index}">✕</button>
                    `;
                    
                    li.addEventListener('click', (e) => {
                        if (!e.target.classList.contains('remove-btn')) {
                            this.playTrack(index);
                        }
                    });

                    li.querySelector('.remove-btn').addEventListener('click', (e) => {
                        e.stopPropagation();
                        this.removeTrack(index);
                    });

                    if (index === this.currentIndex) {
                        li.classList.add('active');
                    }

                    this.playlistElement.appendChild(li);
                });
            }

            playTrack(index) {
                if (index < 0 || index >= this.playlist.length) return;

                this.currentIndex = index;
                const track = this.playlist[index];

                this.audioPlayer.src = track.url;
                this.currentTitle.textContent = track.title || 'Unknown Track';
                this.currentArtist.textContent = track.artist || 'Unknown Artist';
                
                this.audioPlayer.play()
                    .then(() => {
                        this.playBtn.textContent = '⏸️';
                    })
                    .catch(error => {
                        console.error('Erro:', error);
                        alert('Não foi possível reproduzir esta faixa.');
                    });

                this.updatePlaylistUI();
            }

            togglePlay() {
                if (this.audioPlayer.paused) {
                    this.audioPlayer.play();
                    this.playBtn.textContent = '⏸️';
                } else {
                    this.audioPlayer.pause();
                    this.playBtn.textContent = '▶️';
                }
            }

            playNext() {
                if (this.playlist.length === 0) return;
                
                let nextIndex = this.isShuffled 
                    ? Math.floor(Math.random() * this.playlist.length)
                    : (this.currentIndex + 1) % this.playlist.length;
                
                this.playTrack(nextIndex);
            }

            playPrevious() {
                if (this.playlist.length === 0) return;
                
                let prevIndex = this.currentIndex - 1;
                if (prevIndex < 0) prevIndex = this.playlist.length - 1;
                
                this.playTrack(prevIndex);
            }

            handleTrackEnd() {
                if (this.isRepeating) {
                    this.audioPlayer.currentTime = 0;
                    this.audioPlayer.play();
                } else {
                    this.playNext();
                }
            }

            toggleShuffle() {
                this.isShuffled = !this.isShuffled;
                const btn = document.getElementById('shuffleBtn');
                btn.style.background = this.isShuffled ? '#667eea' : 'white';
                btn.style.color = this.isShuffled ? 'white' : '#667eea';
            }

            toggleRepeat() {
                this.isRepeating = !this.isRepeating;
                const btn = document.getElementById('repeatBtn');
                btn.style.background = this.isRepeating ? '#667eea' : 'white';
                btn.style.color = this.isRepeating ? 'white' : '#667eea';
            }

            addUrlTrack() {
                const url = document.getElementById('urlInput').value.trim();
                const title = document.getElementById('titleInput').value.trim();

                if (!url) {
                    alert('Por favor, insira uma URL!');
                    return;
                }

                this.playlist.push({
                    title: title || 'Added Track',
                    artist: 'Custom URL',
                    url: url
                });
                
                this.updatePlaylistUI();
                this.urlModal.classList.remove('active');
                document.getElementById('urlInput').value = '';
                document.getElementById('titleInput').value = '';
            }

            removeTrack(index) {
                if (confirm('Remover esta faixa?')) {
                    this.playlist.splice(index, 1);
                    
                    if (index === this.currentIndex) {
                        this.audioPlayer.pause();
                        this.currentTitle.textContent = 'Nenhuma música';
                        this.currentArtist.textContent = 'Selecione uma faixa';
                        this.currentIndex = -1;
                    } else if (index < this.currentIndex) {
                        this.currentIndex--;
                    }
                    
                    this.updatePlaylistUI();
                }
            }

            exportPlaylist() {
                if (this.playlist.length === 0) {
                    alert('Playlist vazia!');
                    return;
                }

                let m3uContent = '#EXTM3U\n';
                
                this.playlist.forEach(track => {
                    m3uContent += `#EXTINF:-1,${track.title}\n`;
                    m3uContent += `${track.url}\n\n`;
                });

                const blob = new Blob([m3uContent], { type: 'audio/x-mpegurl' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'playlist.m3u';
                a.click();
                URL.revokeObjectURL(url);
            }

            clearPlaylist() {
                if (confirm('Limpar toda a playlist?')) {
                    this.playlist = [];
                    this.currentIndex = -1;
                    this.audioPlayer.pause();
                    this.audioPlayer.src = '';
                    this.currentTitle.textContent = 'Nenhuma música';
                    this.currentArtist.textContent = 'Selecione uma faixa';
                    this.playBtn.textContent = '▶️';
                    this.updatePlaylistUI();
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new M3UPlayer();
        });
    </script>
</body>
</html>
