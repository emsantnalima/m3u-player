<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M3U Player - TV & Música</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; padding: 20px; color: #fff; }
        .container { max-width: 1000px; margin: 0 auto; background: rgba(0,0,0,0.8); border-radius: 20px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.5); border: 1px solid #333; }
        header { background: linear-gradient(135deg, #e94560, #0f3460); padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        header h1 { font-size: 24px; }
        .controls { display: flex; gap: 10px; flex-wrap: wrap; }
        button { padding: 10px 20px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); color: #fff; border-radius: 25px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.3s; backdrop-filter: blur(10px); }
        button:hover { background: #e94560; border-color: #e94560; transform: translateY(-2px); box-shadow: 0 5px 20px rgba(233,69,96,0.4); }
        button.primary { background: #e94560; border-color: #e94560; }
        .main-content { display: grid; grid-template-columns: 350px 1fr; gap: 0; }
        @media (max-width: 768px) { .main-content { grid-template-columns: 1fr; } }
        .playlist-panel { background: rgba(0,0,0,0.4); border-right: 1px solid #333; padding: 20px; max-height: 70vh; display: flex; flex-direction: column; }
        .playlist-panel h2 { margin-bottom: 15px; font-size: 16px; color: #e94560; display: flex; justify-content: space-between; }
        .playlist-panel h2 span { font-size: 12px; background: #333; padding: 3px 10px; border-radius: 15px; color: #aaa; }
        #playlist { list-style: none; overflow-y: auto; flex: 1; }
        #playlist::-webkit-scrollbar { width: 5px; }
        #playlist::-webkit-scrollbar-thumb { background: #e94560; border-radius: 10px; }
        #playlist li { padding: 10px 12px; margin: 3px 0; background: rgba(255,255,255,0.03); border-radius: 8px; cursor: pointer; font-size: 13px; transition: all 0.2s; border-left: 3px solid transparent; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #playlist li:hover { background: rgba(233,69,96,0.2); border-left-color: #e94560; }
        #playlist li.active { background: rgba(233,69,96,0.4); border-left-color: #ff0; color: #fff; }
        .player-panel { padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .video-container { width: 100%; background: #000; border-radius: 10px; overflow: hidden; margin-bottom: 15px; min-height: 300px; display: flex; align-items: center; justify-content: center; }
        video, audio { width: 100%; max-height: 400px; border-radius: 10px; outline: none; }
        .video-container .placeholder { font-size: 60px; opacity: 0.3; }
        #currentInfo { text-align: center; margin-bottom: 15px; width: 100%; }
        #currentInfo h3 { font-size: 16px; color: #e94560; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #currentInfo p { font-size: 12px; color: #888; }
        .player-controls { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .player-controls button { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; padding: 0; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: #1a1a2e; padding: 30px; border-radius: 15px; max-width: 500px; width: 90%; border: 1px solid #333; }
        .modal-content h3 { margin-bottom: 15px; color: #e94560; }
        .modal-content input, .modal-content textarea { width: 100%; padding: 12px; margin: 8px 0; background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 14px; }
        .modal-content textarea { height: 100px; resize: vertical; }
        .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .hidden-file-input { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📺 M3U Player Universal</h1>
            <div class="controls">
                <button id="openUrlBtn">🔗 Abrir Playlist/URL</button>
                <button id="uploadBtn">📤 Upload M3U</button>
                <input type="file" id="fileInput" accept=".m3u,.m3u8" class="hidden-file-input">
                <button id="exportBtn">💾 Exportar</button>
                <button id="clearBtn" style="border-color:#e94560;color:#e94560;">🗑️ Limpar</button>
            </div>
        </header>

        <div class="main-content">
            <div class="playlist-panel">
                <h2>📋 Playlist <span id="trackCount">0 itens</span></h2>
                <ul id="playlist"></ul>
            </div>

            <div class="player-panel">
                <div class="video-container" id="videoContainer">
                    <video id="videoPlayer" controls style="display:none;"></video>
                    <audio id="audioPlayer" controls style="display:none;"></audio>
                    <div class="placeholder" id="placeholder">📺</div>
                </div>
                <div id="currentInfo">
                    <h3 id="currentTitle">Nada em reprodução</h3>
                    <p id="currentUrl">Aguardando conteúdo...</p>
                </div>
                <div class="player-controls">
                    <button id="prevBtn" title="Anterior">⏮️</button>
                    <button id="playBtn" title="Reproduzir/Pausar">▶️</button>
                    <button id="nextBtn" title="Próximo">⏭️</button>
                    <button id="stopBtn" title="Parar">⏹️</button>
                </div>
            </div>
        </div>

        <div id="urlModal" class="modal">
            <div class="modal-content">
                <h3>🔗 Abrir Playlist ou URL Direta</h3>
                <input type="text" id="urlInput" placeholder="https://exemplo.com/playlist.m3u ou link direto .mp3/.m3u8">
                <textarea id="playlistTextarea" placeholder="Ou cole o conteúdo M3U aqui..."></textarea>
                <div class="modal-buttons">
                    <button id="loadUrlBtn" class="primary">▶️ Carregar</button>
                    <button id="cancelUrlBtn">Cancelar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // Estado do player
            const state = {
                playlist: [],
                currentIndex: -1,
                hls: null,
                isVideo: false,
                currentUrl: '',
                currentTitle: ''
            };

            // Elementos DOM
            const els = {
                videoPlayer: document.getElementById('videoPlayer'),
                audioPlayer: document.getElementById('audioPlayer'),
                videoContainer: document.getElementById('videoContainer'),
                placeholder: document.getElementById('placeholder'),
                playlist: document.getElementById('playlist'),
                trackCount: document.getElementById('trackCount'),
                currentTitle: document.getElementById('currentTitle'),
                currentUrl: document.getElementById('currentUrl'),
                playBtn: document.getElementById('playBtn'),
                urlModal: document.getElementById('urlModal'),
                urlInput: document.getElementById('urlInput'),
                playlistTextarea: document.getElementById('playlistTextarea')
            };

            // Detectar tipo de mídia pela extensão ou conteúdo
            function detectMediaType(url) {
                const videoExtensions = ['.m3u8', '.ts', '.mp4', '.webm', '.ogg', '.mkv', '.avi', '.mov', '.flv'];
                const lowerUrl = url.toLowerCase();
                
                for (const ext of videoExtensions) {
                    if (lowerUrl.includes(ext)) return 'video';
                }
                
                // Se o conteúdo M3U contiver links de vídeo, trata como vídeo
                if (lowerUrl.includes('#ext-x-') || lowerUrl.includes('type=video')) return 'video';
                
                return 'audio';
            }

            // Destruir HLS anterior
            function destroyHls() {
                if (state.hls) {
                    state.hls.destroy();
                    state.hls = null;
                }
            }

            // Limpar player
            function resetPlayer() {
                destroyHls();
                els.videoPlayer.style.display = 'none';
                els.audioPlayer.style.display = 'none';
                els.placeholder.style.display = 'block';
                els.videoPlayer.src = '';
                els.audioPlayer.src = '';
                state.isVideo = false;
                state.currentUrl = '';
                state.currentTitle = '';
            }

            // Tocar mídia
            function playMedia(index) {
                if (index < 0 || index >= state.playlist.length) return;

                state.currentIndex = index;
                const track = state.playlist[index];
                const url = track.url;
                const title = track.title || 'Sem título';
                const type = detectMediaType(url);

                resetPlayer();
                state.currentUrl = url;
                state.currentTitle = title;

                els.currentTitle.textContent = title;
                els.currentUrl.textContent = url;

                if (type === 'video') {
                    // Usar HLS.js para streams de vídeo
                    els.audioPlayer.style.display = 'none';
                    els.videoPlayer.style.display = 'block';
                    els.placeholder.style.display = 'none';
                    
                    if (Hls.isSupported()) {
                        destroyHls();
                        state.hls = new Hls({
                            maxBufferLength: 30,
                            liveSyncDuration: 15,
                            liveMaxLatencyDuration: 20,
                            enableWorker: true
                        });
                        state.hls.loadSource(url);
                        state.hls.attachMedia(els.videoPlayer);
                        state.hls.on(Hls.Events.MANIFEST_PARSED, function() {
                            els.videoPlayer.play().catch(() => {});
                        });
                        state.hls.on(Hls.Events.ERROR, function(event, data) {
                            if (data.fatal) {
                                console.error('Erro HLS:', data);
                                alert('Erro ao carregar stream de vídeo');
                            }
                        });
                    } else if (els.videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
                        // Safari suporta HLS nativamente
                        els.videoPlayer.src = url;
                        els.videoPlayer.play().catch(() => {});
                    } else {
                        alert('HLS não é suportado neste navegador');
                    }
                    state.isVideo = true;
                } else {
                    // Áudio normal
                    els.videoPlayer.style.display = 'none';
                    els.audioPlayer.style.display = 'block';
                    els.placeholder.style.display = 'none';
                    els.audioPlayer.src = url;
                    els.audioPlayer.play().catch(() => {
                        alert('Erro ao carregar áudio');
                    });
                    state.isVideo = false;
                }

                els.playBtn.textContent = '⏸️';
                updatePlaylistUI();
            }

            // Parar reprodução
            function stopMedia() {
                if (state.isVideo) {
                    els.videoPlayer.pause();
                    els.videoPlayer.currentTime = 0;
                } else {
                    els.audioPlayer.pause();
                    els.audioPlayer.currentTime = 0;
                }
                els.playBtn.textContent = '▶️';
            }

            // Play/Pause
            function togglePlayPause() {
                const player = state.isVideo ? els.videoPlayer : els.audioPlayer;
                if (player.paused) {
                    player.play();
                    els.playBtn.textContent = '⏸️';
                } else {
                    player.pause();
                    els.playBtn.textContent = '▶️';
                }
            }

            // Próximo
            function playNext() {
                if (state.playlist.length === 0) return;
                const nextIndex = (state.currentIndex + 1) % state.playlist.length;
                playMedia(nextIndex);
            }

            // Anterior
            function playPrevious() {
                if (state.playlist.length === 0) return;
                const prevIndex = state.currentIndex - 1 < 0 ? state.playlist.length - 1 : state.currentIndex - 1;
                playMedia(prevIndex);
            }

            // Parse M3U otimizado
            function parseM3U(content) {
                const lines = content.split('\n');
                const tracks = [];
                let currentTrack = null;

                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i].trim();

                    if (!line || line.startsWith('#EXTM3U')) continue;

                    if (line.startsWith('#EXTINF:')) {
                        const info = line.substring(8);
                        const commaIndex = info.indexOf(',');
                        let title = '';
                        if (commaIndex > -1) {
                            title = info.substring(commaIndex + 1).trim();
                        }
                        currentTrack = {
                            title: title || `Faixa ${tracks.length + 1}`,
                            url: ''
                        };
                    } else if (line.startsWith('http') || line.startsWith('https') || line.startsWith('rtmp') || line.startsWith('rtsp')) {
                        if (currentTrack) {
                            currentTrack.url = line;
                            tracks.push(currentTrack);
                        } else {
                            tracks.push({
                                title: `Stream ${tracks.length + 1}`,
                                url: line
                            });
                        }
                        currentTrack = null;
                    }
                }

                return tracks;
            }

            // Atualizar UI da playlist (otimizado para listas grandes)
            function updatePlaylistUI() {
                const fragment = document.createDocumentFragment();
                
                for (let i = 0; i < state.playlist.length; i++) {
                    const track = state.playlist[i];
                    const li = document.createElement('li');
                    li.textContent = track.title || `Faixa ${i + 1}`;
                    li.dataset.index = i;
                    
                    if (i === state.currentIndex) {
                        li.classList.add('active');
                    }
                    
                    li.addEventListener('click', function() {
                        playMedia(parseInt(this.dataset.index));
                    });
                    
                    fragment.appendChild(li);
                }
                
                els.playlist.innerHTML = '';
                els.playlist.appendChild(fragment);
                els.trackCount.textContent = `${state.playlist.length} itens`;
            }

            // Carregar playlist
            function loadPlaylist(tracks) {
                if (!tracks || tracks.length === 0) {
                    alert('Nenhuma faixa encontrada!');
                    return;
                }
                state.playlist = tracks;
                state.currentIndex = -1;
                resetPlayer();
                updatePlaylistUI();
            }

            // Event Listeners
            document.getElementById('openUrlBtn').addEventListener('click', function() {
                els.urlModal.classList.add('active');
                els.urlInput.value = '';
                els.playlistTextarea.value = '';
            });

            document.getElementById('cancelUrlBtn').addEventListener('click', function() {
                els.urlModal.classList.remove('active');
            });

            document.getElementById('loadUrlBtn').addEventListener('click', function() {
                const url = els.urlInput.value.trim();
                const text = els.playlistTextarea.value.trim();

                if (url) {
                    if (detectMediaType(url) !== 'audio' || url.endsWith('.m3u') || url.endsWith('.m3u8')) {
                        // É uma playlist M3U ou link de vídeo direto
                        fetch(url)
                            .then(response => response.text())
                            .then(content => {
                                const tracks = parseM3U(content);
                                if (tracks.length > 0) {
                                    loadPlaylist(tracks);
                                } else {
                                    // Link direto
                                    loadPlaylist([{ title: 'Link Direto', url: url }]);
                                }
                            })
                            .catch(() => {
                                // Tratar como link direto
                                loadPlaylist([{ title: 'Link Direto', url: url }]);
                            });
                    } else {
                        // Link direto de áudio
                        loadPlaylist([{ title: 'Link Direto', url: url }]);
                    }
                } else if (text) {
                    const tracks = parseM3U(text);
                    loadPlaylist(tracks);
                } else {
                    alert('Insira uma URL ou cole o conteúdo M3U!');
                }

                els.urlModal.classList.remove('active');
            });

            document.getElementById('uploadBtn').addEventListener('click', function() {
                document.getElementById('fileInput').click();
            });

            document.getElementById('fileInput').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    const tracks = parseM3U(e.target.result);
                    loadPlaylist(tracks);
                };
                reader.readAsText(file);
            });

            document.getElementById('playBtn').addEventListener('click', togglePlayPause);
            document.getElementById('nextBtn').addEventListener('click', playNext);
            document.getElementById('prevBtn').addEventListener('click', playPrevious);
            document.getElementById('stopBtn').addEventListener('click', stopMedia);

            document.getElementById('exportBtn').addEventListener('click', function() {
                if (state.playlist.length === 0) {
                    alert('Playlist vazia!');
                    return;
                }
                
                let content = '#EXTM3U\n';
                for (const track of state.playlist) {
                    content += `#EXTINF:-1,${track.title}\n${track.url}\n\n`;
                }
                
                const blob = new Blob([content], { type: 'audio/x-mpegurl' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'playlist.m3u';
                a.click();
                URL.revokeObjectURL(url);
            });

            document.getElementById('clearBtn').addEventListener('click', function() {
                if (confirm('Limpar toda a playlist?')) {
                    state.playlist = [];
                    state.currentIndex = -1;
                    resetPlayer();
                    updatePlaylistUI();
                    els.currentTitle.textContent = 'Nada em reprodução';
                    els.currentUrl.textContent = 'Aguardando conteúdo...';
                    els.playBtn.textContent = '▶️';
                }
            });

            // Eventos dos players
            els.videoPlayer.addEventListener('ended', playNext);
            els.audioPlayer.addEventListener('ended', playNext);
            els.videoPlayer.addEventListener('play', function() { els.playBtn.textContent = '⏸️'; });
            els.videoPlayer.addEventListener('pause', function() { els.playBtn.textContent = '▶️'; });
            els.audioPlayer.addEventListener('play', function() { els.playBtn.textContent = '⏸️'; });
            els.audioPlayer.addEventListener('pause', function() { els.playBtn.textContent = '▶️'; });

        })();
    </script>
</body>
</html>
